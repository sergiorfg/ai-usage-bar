name: Build macOS app

on:
  workflow_dispatch:        # build on demand from the Actions tab
  push:
    tags:
      - "v*"                # building a tag also publishes a Release

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rumps pyinstaller

      - name: Build .app
        run: |
          python -m PyInstaller --noconfirm --clean --windowed \
            --name "AI Usage Bar" \
            --osx-bundle-identifier com.bouzlabs.aiusagebar \
            usage_bar.py
          /usr/libexec/PlistBuddy -c "Add :LSUIElement bool true" \
            "dist/AI Usage Bar.app/Contents/Info.plist" || true

      - name: Zip the app
        run: |
          cd dist
          ditto -c -k --keepParent "AI Usage Bar.app" "AI-Usage-Bar.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Usage-Bar-macos
          path: dist/AI-Usage-Bar.zip

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AI-Usage-Bar.zip
